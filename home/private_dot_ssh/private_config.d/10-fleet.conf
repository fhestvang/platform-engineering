# Managed by chezmoi (platform-engineering/home). Shared SSH fragment for every client.
# Machine-specific blocks (e.g. how Spark reaches the laptop) stay in the local
# ~/.ssh/config, which pulls this in via `Include config.d/*.conf`.

# Force a guaranteed-present UTF-8 locale on fleet/tailnet boxes that lack
# en_US.UTF-8, so the login shell does not spew setlocale warnings. SetEnv is
# first-match-wins, so keep this before the alias block. The *.olm-hops.ts.net
# glob auto-covers future Scaleway VPCs joined to the tailnet.
Host eigil* ingvild* dicte* pi3* scw-* *.olm-hops.ts.net
  SetEnv LC_ALL=C.UTF-8

# Fleet aliases over the tailnet. %h expands to the name you typed, so this one
# block serves `ssh eigil`, `ssh ingvild`, `ssh dicte`, `ssh pi3`. Tailnet FQDNs
# (not .home) so the aliases also work from off-LAN clients like the laptop.
Host eigil ingvild dicte pi3
  HostName %h.olm-hops.ts.net
  User fhestvang
  IdentityFile ~/.ssh/spark_to_tinys_ed25519
  IdentitiesOnly yes
  StrictHostKeyChecking accept-new
  ServerAliveInterval 30
  ConnectTimeout 8

# Scaleway instance aliases over the tailnet. Cloud-init installs the
# operator's normal SSH public key for fhestvang, so do not force the tinys-only
# key here.
Host scw-*.olm-hops.ts.net
  HostName %h
  User fhestvang
  StrictHostKeyChecking accept-new
  ServerAliveInterval 30
  ConnectTimeout 8

Host scw-* !*.olm-hops.ts.net
  HostName %h.olm-hops.ts.net
  User fhestvang
  StrictHostKeyChecking accept-new
  ServerAliveInterval 30
  ConnectTimeout 8
