# tmux configuration

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
set -ag terminal-overrides ",*256col*:Tc"
set -g extended-keys on
run-shell -b 'tmux set-option -g extended-keys-format csi-u 2>/dev/null || true'

set -g history-limit 50000
set -g mouse on
# focus-events ON. The grouped-session sharing this was guarding against is gone
# (de-grouped 2026-06-11: no sibling sessions left to reconcile to), so the old
# reason to keep it off no longer applies. With it OFF, tmux never learns when
# WezTerm loses/regains focus, so it doesn't force a redraw across the Win+Shift+S
# focus-out/in — WezTerm keeps showing a stale frame and the snip grabs the wrong
# window. ON makes tmux refresh on focus change, which keeps the snip current.
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles off
setw -g automatic-rename off
setw -g allow-rename off
set -g detach-on-destroy off
set -sg escape-time 0

unbind-key -q C-b
set -g prefix M-a
bind-key M-a send-prefix

set -g allow-passthrough on
set -g set-clipboard on
set -g update-environment "DISPLAY WAYLAND_DISPLAY XAUTHORITY DBUS_SESSION_BUS_ADDRESS XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_RUNTIME_DIR PULSE_SERVER SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION SSH_TTY WINDOWID KRB5CCNAME"

# Theme palette: Catppuccin Mocha. To try another scheme, swap these hexes and
# run `tmux source-file ~/.tmux.conf` — everything below references the
# variables, nothing else needs touching. Requires tmux >= 3.4 (formats in styles).
set -g @thm_bg "#1e1e2e"      # base — keep in sync with the WezTerm scheme bg
set -g @thm_fg "#cdd6f4"      # text
set -g @thm_subtext "#a6adc8" # subtext0: default status fg
set -g @thm_muted "#7f849c"   # overlay1: inactive window titles
set -g @thm_dim "#6c7086"     # overlay0: status-right info
set -g @thm_surface "#45475a" # surface1: pane borders
set -g @thm_accent "#fab387"  # peach: active window, borders, session badge
set -g @thm_ok "#a6e3a1"      # green: agent working
set -g @thm_warn "#f9e2af"    # yellow: agent done / bell
set -g @thm_info "#89dceb"    # sky: agent blocked/question

set -g status-position bottom
set -g status 2
set -g status-style "bg=#{@thm_bg},fg=#{@thm_subtext}"
set -g status-format[0] "#[bg=#{@thm_bg}] "
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
run-shell -b 'host="$(if [ -x "$HOME/.local/bin/prompt-host" ]; then "$HOME/.local/bin/prompt-host"; else hostname -s 2>/dev/null || printf local; fi)"; tmux set-option -gq @fhh_host_label "$host"'
set -g status-left "#{prefix_highlight}#[fg=#{@thm_accent},bold] #S:#I.#P "
set -g status-right "#[fg=#{@thm_dim}] CPU:#{cpu_percentage} RAM:#{ram_percentage} | %H:%M "
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 96
set -g @prefix_highlight_prefix_prompt 'NORMAL'
set -g @prefix_highlight_empty_prompt 'INSERT'
set -g @prefix_highlight_empty_has_affixes 'on'
set -g bell-action none
set -g visual-bell off
setw -g monitor-bell off
setw -g window-status-bell-style "fg=#{@thm_warn},bold"
setw -g window-status-format "#[fg=#{@thm_muted}] #I:#W#{?#{==:#{@codex_agent_state},working},#[fg=#{@thm_ok}] *,#{?#{||:#{==:#{@codex_agent_state},blocked},#{||:#{==:#{@codex_agent_state},question},#{||:#{==:#{@codex_agent_state},waiting},#{==:#{@codex_agent_state},help}}}},#[fg=#{@thm_info}] ?,#{?#{==:#{@codex_agent_state},done},#[fg=#{@thm_warn}] !,#{?window_bell_flag,#[fg=#{@thm_warn}] !,}}}}#[fg=#{@thm_muted}] "
setw -g window-status-current-format "#[fg=#{@thm_accent},bold] #I:#W#{?#{==:#{@codex_agent_state},working},#[fg=#{@thm_ok}] *,#{?#{||:#{==:#{@codex_agent_state},blocked},#{||:#{==:#{@codex_agent_state},question},#{||:#{==:#{@codex_agent_state},waiting},#{==:#{@codex_agent_state},help}}}},#[fg=#{@thm_info}] ?,#{?#{==:#{@codex_agent_state},done},#[fg=#{@thm_warn}] !,#{?window_bell_flag,#[fg=#{@thm_warn}] !,}}}}#[fg=#{@thm_accent},bold] "

set -g pane-border-style "fg=#{@thm_surface}"
set -g pane-active-border-style "fg=#{@thm_accent},bold"
set -g pane-border-status off
# No window-style: let the terminal emulator own fg/bg so a WezTerm scheme
# change shows through immediately instead of being painted over by tmux.

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-open '/home/fhestvang/.local/bin/open-on-laptop'

setw -g mode-keys vi
bind C-u copy-mode \; send-keys -X search-backward "^› "
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipboard-copy"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind , command-prompt -p "Tab name: " "set-window-option automatic-rename off; rename-window '%%'"
bind T command-prompt -p "Pane title: " "set-option -pq @pane_label '%%'"
set-hook -g pane-focus-in 'run-shell -b "[ -x \"$HOME/bin/tmux-agent-state\" ] && \"$HOME/bin/tmux-agent-state\" seen #{q:pane_id} || { [ -x \"$HOME/.local/bin/tmux-agent-state\" ] && \"$HOME/.local/bin/tmux-agent-state\" seen #{q:pane_id} || true; }"'
set-hook -g after-select-pane 'run-shell -b "[ -x \"$HOME/bin/tmux-agent-state\" ] && \"$HOME/bin/tmux-agent-state\" seen #{q:pane_id} || { [ -x \"$HOME/.local/bin/tmux-agent-state\" ] && \"$HOME/.local/bin/tmux-agent-state\" seen #{q:pane_id} || true; }"'
set-hook -g session-window-changed 'run-shell -b "[ -x \"$HOME/bin/tmux-agent-state\" ] && \"$HOME/bin/tmux-agent-state\" seen #{q:pane_id} || { [ -x \"$HOME/.local/bin/tmux-agent-state\" ] && \"$HOME/.local/bin/tmux-agent-state\" seen #{q:pane_id} || true; }"'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind n next-window
bind p previous-window

bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

bind g display-popup -E -w 100% -h 100% -d "#{pane_current_path}" "git diff --color=always | delta --paging=always --line-numbers --navigate"

bind z display-popup -E -w 85% -h 75% -d "#{pane_current_path}" -T "zoxide" "$HOME/.local/bin/tmux-zoxide-popup --window"
bind Z display-popup -E -w 85% -h 75% -d "#{pane_current_path}" -T "zoxide shell" "$HOME/.local/bin/tmux-zoxide-popup --shell"
bind M display-popup -E -w 90% -h 90% -d "#{pane_current_path}" -T "markdown" "find . -type f -iname '*.md' -o -type f -iname '*.markdown' 2>/dev/null | fzf --preview 'glow --style dark {}' --preview-window=right:60%:wrap --bind 'enter:become(glow --pager {})'"
bind -n M-m display-popup -E -w 92% -h 82% -d "#{pane_current_path}" -T "markdown preview" "$HOME/.local/bin/tmux-markdown-preview"
# --- command palette: switched to eduwass/tmux-palette on 2026-06-15 ---
# Old custom palette retired but kept on disk for a one-line revert:
#   $HOME/.local/bin/tmux-command-palette
# To revert: uncomment the two old lines below, remove the tmux-palette
# @plugin line and the @palette-key set further down, then reload.
# bind P display-popup -E -w 92% -h 82% -d "#{pane_current_path}" -T "command palette" "TMUX_PALETTE_PANE=#{pane_id} TMUX_PALETTE_WINDOW=#{window_id} exec $HOME/.local/bin/tmux-command-palette"
# bind -n M-p display-popup -E -w 92% -h 82% -d "#{pane_current_path}" -T "command palette" "TMUX_PALETTE_PANE=#{pane_id} TMUX_PALETTE_WINDOW=#{window_id} exec $HOME/.local/bin/tmux-command-palette"
# M-p (no prefix) is bound by tmux-palette via @palette-key (set below, before tpm runs).
# Prefix-P also opens it:
bind P run-shell "$HOME/.config/tmux/plugins/tmux-palette/bin/tmux-palette.sh"
bind -n M-u run-shell -b "$HOME/.local/bin/tmux-fzf-url 2000 $HOME/.local/bin/open-on-laptop '' '' ''"
bind-key -T root C-MouseDown1Pane select-pane -t = \; run-shell -b "$HOME/.local/bin/tmux-open-mouse-url #{q:mouse_hyperlink} #{q:mouse_word} #{q:mouse_line} #{q:pane_id}"

bind S if-shell 'command -v sesh >/dev/null 2>&1' 'display-popup -E -w 80% -h 70% -d "#{pane_current_path}" -T "sesh" "sesh picker --icons --hide-duplicates --separator-aware"' 'display-message "sesh not found"'
bind L if-shell 'command -v sesh >/dev/null 2>&1' 'run-shell "sesh last"' 'switch-client -l'
bind 9 if-shell 'command -v sesh >/dev/null 2>&1' 'run-shell "sesh connect --root #{q:pane_current_path}"' 'display-message "sesh not found"'

bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipboard-copy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipboard-copy"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'NHDaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'eduwass/tmux-palette'
set -g @plugin 'omerxx/tmux-floax'

# Bind the palette to M-p (no prefix) to match the retired custom palette.
# Read by tmux-palette.tmux when tpm sources it below.
set -g @palette-key 'M-p'

# floax: persistent floating "scratch" pane (toggle on top of any window).
# Defaults are prefix-p / prefix-P, which collide here (p=previous-window,
# P=command palette), so toggle is prefix-f and the menu is prefix-F.
# Colors track the Catppuccin Mocha palette instead of floax's magenta/blue.
set -g @floax-bind 'f'
set -g @floax-bind-menu 'F'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#fab387'
set -g @floax-text-color '#cdd6f4'
set -g @floax-change-path 'true'

# Bootstrap TPM if it's missing (fresh machine), then run it.
if-shell '[ ! -x "$HOME/.tmux/plugins/tpm/tpm" ]' \
  'run-shell -b "git clone --depth 1 https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm"'
if-shell '[ -x "$HOME/.tmux/plugins/tpm/tpm" ]' 'run "$HOME/.tmux/plugins/tpm/tpm"'
# Self-install any declared-but-not-yet-cloned plugin on every reload. install_plugins
# skips ones already present, so this is cheap and removes the need for manual prefix+I
# when a new @plugin line lands on a machine (e.g. via the hourly chezmoi-sync).
if-shell '[ -x "$HOME/.tmux/plugins/tpm/bin/install_plugins" ]' \
  'run-shell -b "$HOME/.tmux/plugins/tpm/bin/install_plugins"'

# Mouse wheel: in a mouse-aware fullscreen app forward the scroll; otherwise
# enter copy-mode on wheel-up (and pass wheel-down through). The copy-mode-vi
# binding below makes each wheel notch step 3 lines. (The previous "better-mouse"
# one-liner errored with "no mouse target" on tmux 3.4 and broke scrollback.)
bind-key -T root WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind-key -T root WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "send-keys -M"
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X -N 3 scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X -N 3 scroll-down
