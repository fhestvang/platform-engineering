# Static fleet inventory (pets) over the tailnet. VPCs (cattle) come from the
# Scaleway dynamic inventory (see scaleway.yml) once they exist.
[fleet]
eigil    ansible_host=eigil.olm-hops.ts.net
ingvild  ansible_host=ingvild.olm-hops.ts.net
dicte    ansible_host=dicte.olm-hops.ts.net
pi3      ansible_host=pi3.olm-hops.ts.net

[fleet:vars]
ansible_user=fhestvang
ansible_ssh_private_key_file=~/.ssh/spark_to_tinys_ed25519

# spark/laptop are agent hosts; managed separately (they run the control node).
[agent_hosts]
# spark and laptop are typically where you RUN ansible from, not targets.
